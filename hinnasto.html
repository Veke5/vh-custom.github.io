<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderni Hinnasto</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  header {
    background-color: #000;
    padding: 1rem;
    text-align: center;
  }

  header h1 {
    color: #e60000;
    margin: 0;
    font-size: 2rem;
  }

  nav {
    display: flex;
    justify-content: center;
    margin: 2rem 0;
  }

  nav button {
    background-color: #e60000;
    color: #fff;
    border: none;
    padding: 0.8rem 1.5rem;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
  }

  nav button:hover {
    background-color: #ff3333;
  }

  /* Hinnasto-overlay */
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.7);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s;
    z-index: 10;
  }

  .overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .hinnasto-container {
    position: fixed;
    top: -100%;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 600px;
    background-color: #1a1a1a;
    border: 2px solid #e60000;
    border-radius: 10px;
    overflow: hidden;
    z-index: 20;
    transition: top 0.5s ease;
  }

  .hinnasto-container.active {
    top: 50px; /* alas liukuu näkyviin */
  }

  .hinnasto table {
    width: 100%;
    border-collapse: collapse;
  }

  .hinnasto th, .hinnasto td {
    padding: 1rem;
    text-align: left;
    border-bottom: 1px solid #e60000;
  }

  .hinnasto th {
    background-color: #e60000;
    color: #fff;
  }

</style>
</head>
<body>

<header>
  <h1>Yrityksesi Nimi</h1>
</header>

<nav>
  <button id="toggleHinnasto">Näytä Hinnasto</button>
</nav>

<div class="overlay" id="overlay"></div>

<div class="hinnasto-container" id="hinnasto">
  <div class="hinnasto">
    <table>
      <thead>
        <tr>
          <th>Palvelu</th>
          <th>Hinta</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Palvelu 1</td>
          <td>50€</td>
        </tr>
        <tr>
          <td>Palvelu 2</td>
          <td>80€</td>
        </tr>
        <tr>
          <td>Palvelu 3</td>
          <td>120€</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const button = document.getElementById('toggleHinnasto');
  const hinnasto = document.getElementById('hinnasto');
  const overlay = document.getElementById('overlay');

  function toggleHinnasto() {
    hinnasto.classList.toggle('active');
    overlay.classList.toggle('active');
    if(hinnasto.classList.contains('active')){
      button.textContent = 'Piilota Hinnasto';
    } else {
      button.textContent = 'Näytä Hinnasto';
    }
  }

  button.addEventListener('click', toggleHinnasto);
  overlay.addEventListener('click', toggleHinnasto); // sulje klikkaamalla taustaa
</script>

</body>
</html>
