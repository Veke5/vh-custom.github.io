<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #000;
    padding: 1rem;
    text-align: center;
  }

  header h1 {
    color: #e60000;
    margin: 0;
    font-size: 2rem;
  }

  nav {
    display: flex;
    justify-content: center;
    margin: 2rem 0;
  }

  nav button {
    background-color: #e60000;
    color: #fff;
    border: none;
    padding: 0.8rem 1.5rem;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
  }

  nav button:hover {
    background-color: #ff3333;
  }

  .hinnasto {
    max-width: 600px;
    margin: 0 auto;
    background-color: #1a1a1a;
    border: 2px solid #e60000;
    border-radius: 10px;
    overflow: hidden;
    display: none; /* piilotettu aluksi */
    animation: fadeIn 0.5s forwards;
  }

  .hinnasto table {
    width: 100%;
    border-collapse: collapse;
  }

  .hinnasto th, .hinnasto td {
    padding: 1rem;
    text-align: left;
    border-bottom: 1px solid #e60000;
  }

  .hinnasto th {
    background-color: #e60000;
    color: #fff;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }
</style>
