<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hinnasto</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #111; /* tumma tausta, ei musta kokonaan */
    color: #fff;
    margin: 0;
    padding: 0;
  }

  header {
    background-color: #000;
    padding: 1rem;
    text-align: center;
  }

  header h1 {
    color: #e60000;
    margin: 0;
    font-size: 2rem;
  }

  nav {
    display: flex;
    justify-content: center;
    margin: 2rem 0;
  }

  nav button {
    background-color: #e60000;
    color: #fff;
    border: none;
    padding: 0.8rem 1.5rem;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
  }

  nav button:hover {
    background-color: #ff3333;
  }

  .hinnasto {
    max-width: 600px;
    margin: 0 auto;
    background-color: #1a1a1a;
    border: 2px solid #e60000;
    border-radius: 10px;
    overflow: hidden;
    display: none; /* aluksi piilotettu */
    animation: fadeIn 0.5s forwards;
  }

  .hinnasto table {
    width: 100%;
    border-collapse: collapse;
  }

  .hinnasto th, .hinnasto td {
    padding: 1rem;
    text-align: left;
    border-bottom: 1px solid #e60000;
  }

  .hinnasto th {
    background-color: #e60000;
    color: #fff;
  }

  @keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
  }

</style>
</head>
<body>

<header>
  <h1>Yrityksesi Nimi</h1>
</header>

<nav>
  <button id="toggleHinnasto">Näytä Hinnasto</button>
</nav>

<div class="hinnasto" id="hinnasto">
  <table>
    <thead>
      <tr>
        <th>Palvelu</th>
        <th>Hinta</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Palvelu 1</td>
        <td>50€</td>
      </tr>
      <tr>
        <td>Palvelu 2</td>
        <td>80€</td>
      </tr>
      <tr>
        <td>Palvelu 3</td>
        <td>120€</td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  const button = document.getElementById('toggleHinnasto');
  const hinnasto = document.getElementById('hinnasto');

  button.addEventListener('click', () => {
    if(hinnasto.style.display === 'none' || hinnasto.style.display === ''){
      hinnasto.style.display = 'block';
      button.textContent = 'Piilota Hinnasto';
    } else {
      hinnasto.style.display = 'none';
      button.textContent = 'Näytä Hinnasto';
    }
  });
</script>

</body>
</html>
